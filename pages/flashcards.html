<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LODVault Flashcards</title>
  <link rel="stylesheet" href="../styles/flashcards.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">LODVault</p>
        <h1>Flashcards</h1>
        <p id="deck-status" class="muted">Loading deck…</p>
      </div>
      <div class="controls">
        <label class="control-group">
          <span>Deck</span>
          <select id="deck-filter">
            <option value="study">Study list</option>
            <option value="favorites">Favorites</option>
            <option value="all">All saved</option>
          </select>
        </label>
        <button id="shuffle-deck" class="secondary-button">Shuffle</button>
      </div>
    </header>

    <section id="empty-state" class="empty-state is-hidden">
      No words available for this flashcard deck yet.
    </section>

    <section id="card-shell" class="card-shell is-hidden">
      <div id="progress" class="progress">1 / 1</div>
      <button id="flashcard" class="flashcard" type="button">
        <div class="card-face card-front">
          <span class="face-label">Front</span>
          <h2 id="card-word">Word</h2>
          <p id="card-type" class="muted"></p>
          <p class="hint">Click Reveal to show the answer.</p>
        </div>
        <div class="card-face card-back">
          <span class="face-label">Back</span>
          <div id="card-answer" class="answer"></div>
        </div>
      </button>

      <div class="actions">
        <button id="prev-card" class="nav-button secondary-button secondary-button-light">← Prev</button>
        <button id="flip-card" class="nav-button secondary-button">Reveal</button>
        <button id="next-card" class="nav-button secondary-button secondary-button-light">Next →</button>
      </div>
    </section>
  </main>

  <script src="../scripts/shared.js"></script>
  <script src="../scripts/flashcards.js"></script>
</body>
</html>
