<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LODVault Preview</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body>
  <header class="toolbar">
    <div>
      <p class="eyebrow">LODVault</p>
      <h1>Export preview</h1>
      <p id="preview-meta" class="meta">Loading…</p>
    </div>
    <div class="toolbar-actions">
      <button id="refresh-preview" class="toolbar-button toolbar-button-light">Refresh</button>
      <button id="download-html" class="toolbar-button">Download HTML</button>
    </div>
  </header>

  <main class="preview-shell">
    <iframe id="preview-frame" title="LODVault export preview"></iframe>
  </main>

  <script src="shared.js"></script>
  <script src="preview.js"></script>
</body>
</html>
